<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title if title else "LifeTag" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>

  <div class="nav">
    <div class="nav__inner">
      <a class="brand" href="{{ url_for('landing') }}">
        <div class="logo">LT</div>
        <div class="brand__text">
          <div class="brand__title">LifeTag</div>
          <div class="brand__sub">Smart Health ID</div>
        </div>
      </a>

      <div class="navlinks">
        <a href="{{ url_for('landing') }}">Home</a>
        <a href="{{ url_for('login') }}">Login</a>
        <a class="btn btn--soft" href="{{ url_for('signup') }}">Get your QR</a>
      </div>
    </div>
  </div>

  <div class="page">
    <div class="container">
      {% block content %}{% endblock %}
      <div class="footer">
        <div class="small">LifeTag is designed for fast emergency access. Full data stays protected online.</div>
      </div>
    </div>
  </div>

</body>
</html>
