<!DOCTYPE html>
<html>
<head>
  <title>Set PIN</title>
  <style>
    body{font-family:Arial;background:#0b1220;color:#fff;margin:0}
    .box{max-width:520px;margin:50px auto;background:#121a2b;border:1px solid #26324f;border-radius:16px;padding:18px}
    input{width:100%;padding:12px;margin:10px 0;border-radius:12px;border:1px solid #2b3755;background:#0b1220;color:#fff}
    button{width:100%;padding:12px;border-radius:12px;border:0;background:#3b82f6;color:#fff;font-weight:800;cursor:pointer}
    a{color:#93c5fd;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h2>Set PIN (4 or 6 digits)</h2>
    <form method="POST">
      <input name="pin" placeholder="Enter new PIN" maxlength="6" required />
      <input name="pin2" placeholder="Confirm PIN" maxlength="6" required />
      <button type="submit">Save PIN</button>
    </form>
    <div style="margin-top:10px"><a href="/patient">Back</a></div>
  </div>
</body>
</html>
